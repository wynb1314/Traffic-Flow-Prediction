{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}交通预测系统{% endblock %}</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --nav-bg: #1a1d29;
            --nav-text: #e8eaed;
            --nav-active: #4ecdc4;
            --page-bg: #0f1117;
            --card-bg: #1c1f2a;
            --text: #c4c8cc;
            --accent: #4ecdc4;
            --border: #2d3142;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--page-bg);
            color: var(--text);
            min-height: 100vh;
        }
        .nav {
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            height: 56px;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--nav-text);
            margin-right: 2rem;
        }
        .nav-links {
            display: flex;
            gap: 0.25rem;
        }
        .nav-links a {
            padding: 0.5rem 1rem;
            color: var(--nav-text);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .nav-links a:hover { background: rgba(78, 205, 196, 0.15); color: var(--accent); }
        .nav-links a.active { background: rgba(78, 205, 196, 0.2); color: var(--accent); font-weight: 500; }
        .main { padding: 1.5rem 2rem; max-width: 1600px; margin: 0 auto; }
        .card {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }
        .card h2 { margin: 0 0 1rem 0; font-size: 1.15rem; color: var(--nav-text); }
        .chart-container { width: 100%; min-height: 380px; }
        .metrics-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        .metric-box {
            background: var(--nav-bg);
            padding: 1rem 1.25rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            min-width: 140px;
        }
        .metric-box .label { font-size: 0.85rem; color: #888; }
        .metric-box .value { font-size: 1.4rem; font-weight: 600; color: var(--accent); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <!-- <span class="nav-title">交通流量预测系统</span> -->
        <span class="nav-title" style="font-size: 2rem;">交通流量预测系统</span>
        <div class="nav-links">
            <a href="{% url 'data_explore' %}" class="{% if page == 'explore' %}active{% endif %}">数据探索</a>
            <a href="{% url 'predict' %}" class="{% if page == 'predict' %}active{% endif %}">智能预测</a>
            <a href="{% url 'system_dashboard' %}" class="{% if page == 'dashboard' %}active{% endif %}">系统仪表盘</a>
        </div>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    {% block extra_js %}{% endblock %}
</body>
</html>
