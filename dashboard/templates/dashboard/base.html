{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}交通预测系统{% endblock %}</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f5f4f2;
            --sidebar-bg: #1a1a1a;
            --sidebar-hover: #2a2a2a;
            --sidebar-active: #333333;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --text-light: #9a9a9a;
            --text-inverse: #ffffff;
            --accent: #f97316;
            --accent-light: #fb923c;
            --accent-bg: #fff7ed;
            --border: #e8e6e3;
            --border-light: #f0eeeb;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: var(--sidebar-bg);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .sidebar-logo-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-inverse);
            letter-spacing: 0.02em;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 8px 12px;
            margin-bottom: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 14px;
            font-weight: 450;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--sidebar-hover);
            color: rgba(255, 255, 255, 0.9);
        }

        .nav-item.active {
            background: var(--sidebar-active);
            color: var(--text-inverse);
        }

        .nav-item.active .nav-icon {
            color: var(--accent);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-icon svg {
            width: 18px;
            height: 18px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-footer-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
        }

        /* 主内容区 */
        .main-wrapper {
            flex: 1;
            margin-left: 240px;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        .main {
            padding: 32px 40px;
            max-width: 1400px;
        }

        /* 页面标题 */
        .page-header {
            margin-bottom: 28px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 卡片 */
        .card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title-icon {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 2px;
        }

        .card-body {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .stat-value.accent {
            color: var(--accent);
        }

        /* 指标卡片 */
        .metrics-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .metric-box {
            background: var(--bg-tertiary);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            min-width: 140px;
            border-left: 3px solid var(--accent);
        }

        .metric-box .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .metric-box .value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 图表容器 */
        .chart-container {
            width: 100%;
            min-height: 360px;
            border-radius: var(--radius-sm);
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-light);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border-light);
            color: var(--text-primary);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* 输入框 */
        input[type="number"],
        input[type="text"],
        select {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
            min-width: 100px;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }

        /* 滑块 */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        /* 列表 */
        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            padding: 10px 0;
            padding-left: 20px;
            position: relative;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
        }

        ul li:last-child {
            border-bottom: none;
        }

        ul li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        ul li strong {
            color: var(--text-primary);
        }

        /* 表单控件行 */
        .ctrl-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .ctrl-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 两列布局 */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .two-col {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 72px;
            }
            .sidebar-logo-text,
            .nav-section-title,
            .nav-item span,
            .sidebar-footer-text {
                display: none;
            }
            .nav-item {
                justify-content: center;
                padding: 14px;
            }
            .main-wrapper {
                margin-left: 72px;
            }
            .main {
                padding: 24px 20px;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/>
                        <path d="m19 9-5 5-4-4-3 3"/>
                    </svg>
                </div>
                <span class="sidebar-logo-text">交通预测系统</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">功能</div>
                <a href="{% url 'data_explore' %}" class="nav-item {% if page == 'explore' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.3-4.3"/>
                        </svg>
                    </span>
                    <span>数据探索</span>
                </a>
                <a href="{% url 'predict' %}" class="nav-item {% if page == 'predict' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v4"/>
                            <path d="m16.2 7.8 2.9-2.9"/>
                            <path d="M18 12h4"/>
                            <path d="m16.2 16.2 2.9 2.9"/>
                            <path d="M12 18v4"/>
                            <path d="m4.9 19.1 2.9-2.9"/>
                            <path d="M2 12h4"/>
                            <path d="m4.9 4.9 2.9 2.9"/>
                        </svg>
                    </span>
                    <span>智能预测</span>
                </a>
                <a href="{% url 'system_dashboard' %}" class="nav-item {% if page == 'dashboard' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="7" height="9" x="3" y="3" rx="1"/>
                            <rect width="7" height="5" x="14" y="3" rx="1"/>
                            <rect width="7" height="9" x="14" y="12" rx="1"/>
                            <rect width="7" height="5" x="3" y="16" rx="1"/>
                        </svg>
                    </span>
                    <span>系统仪表盘</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-footer-text">PEMS04 数据集</div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <div class="main-wrapper">
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
